syntax = "proto3";
package rpcPb;
option go_package = "github.com/drop/GoServer/server/logic/rpcPb;rpcPb";

enum RPC_MESSAGE_ID
{
  RPC_MESSAGE_ID_NONE = 0;
  RPC_MESSAGE_ID_BEGIN = 1000000;

  // 排行榜rpc消息
  RPC_MESSAGE_GET_RANK_INFO_REQ = 1000001;
  RPC_MESSAGE_GET_RANK_INFO_RESP = 1000002;
  RPC_MESSAGE_CHECK_RANK_FULL_REQ = 1000003;
  RPC_MESSAGE_CHECK_RANK_FULL_RESP = 1000004;
  RPC_MESSAGE_GET_MY_RANK_REQ = 1000005;
  RPC_MESSAGE_THUMB_UP_RANK_INFO = 1000006;
  RPC_MESSAGE_GET_MY_ARENA_RANK_RESP = 1000007;
  RPC_MESSAGE_UPDATE_PLAYER_RANK_INFO = 1000008;

  RPC_MESSAGE_CREATE_ALLIANCE_REQ = 1000101;
  RPC_MESSAGE_CREATE_ALLIANCE_RESP = 1000102;
  RPC_MESSAGE_APPROVE_ALLIANCE_APPLY_BATCH_REQ = 1000103;
  RPC_MESSAGE_APPROVE_ALLIANCE_APPLY_BATCH_RESP = 1000104;
  RPC_MESSAGE_KICK_ALLIANCE_MEMBER_REQ = 1000106;
  RPC_MESSAGE_KICK_ALLIANCE_MEMBER_RESP = 1000107;
  RPC_MESSAGE_QUIT_ALLIANCE_REQ = 1000108;
  RPC_MESSAGE_QUIT_ALLIANCE_RESP = 1000109;
  RPC_MESSAGE_SET_ALLIANCE_NOTICE_REQ = 1000110;
  RPC_MESSAGE_SET_ALLIANCE_NOTICE_RESP = 1000111;
  RPC_MESSAGE_RENAME_ALLIANCE_REQ = 1000112;
  RPC_MESSAGE_RENAME_ALLIANCE_RESP = 1000113;
  RPC_MESSAGE_TRANSFER_ALLIANCE_LEADER_REQ = 1000114;
  RPC_MESSAGE_TRANSFER_ALLIANCE_LEADER_RESP = 1000115;
  RPC_MESSAGE_PUSH_ALLIANCE_CHANGED = 1000116;
  RPC_MESSAGE_CHANGE_ALLIANCE_BASIC_INFO_REQ = 1000117;
  RPC_MESSAGE_CHANGE_ALLIANCE_BASIC_INFO_RESP = 1000118;
  RPC_MESSAGE_GET_ALLIANCE_INFO_REQ = 1000119;
  RPC_MESSAGE_GET_ALLIANCE_INFO_RESP = 1000120;
  RPC_MESSAGE_CHANGE_MEMBER_POSITION_REQ = 1000121;
  RPC_MESSAGE_CHANGE_MEMBER_POSITION_RESP = 1000122;
  RPC_MESSAGE_APPLY_ALLIANCE_REQ = 1000123;
  RPC_MESSAGE_APPLY_ALLIANCE_RESP = 1000124;
}

enum RPC_SERVER_OPERATION
{
  RPC_OPERATION_NONE = 0;
  RPC_OPERATION_RELOAD_ACTIVITY = 1;
  RPC_OPERATION_RELOAD_ACTIVITY_CONFIG = 2;
  RPC_OPERATION_ANNOUNCE_INFO_UPDATE = 3;
  RPC_OPERATION_RELOAD_SERVER_INFO = 4;
}

message HelloReq {
  int32 nodeId = 1;
  string nodeType = 2;
  string address = 3;
}

message HelloResp {
}

message EmptyResp {}

message ClientReq {
  int32 msgId = 1;// 消息id
  bytes data = 2;// 原始pb二进制
}

message NotifyOperationMessage{
  RPC_SERVER_OPERATION operation = 1;
}

message DeliverRechargeItemReq{
  int64 orderId = 1; // 订单id
  string account = 2;// 账号
  int64 userId = 3; // 用户id
  int32 serverId = 4;// 服务器id
}
