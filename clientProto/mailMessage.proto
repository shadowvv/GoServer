syntax = "proto3";

package pb;

option go_package = "../logic/pb;pb";

// ====== 邮件相关消息ID（2900-2999） ======
// 已在messageEnum.proto中定义

// 邮件类型枚举
enum MailType {
  MAIL_TYPE_NORMAL = 0;    // 普通邮件
  MAIL_TYPE_ADVERTISEMENT = 1; // 广告邮件
  MAIL_TYPE_OFFICIAL = 2;  // 官方邮件
  MAIL_TYPE_COMMAND = 3;   // 命令邮件（GM）
  MAIL_TYPE_PLAYER = 4;    // 玩家邮件
}

// 邮件状态枚举
enum MailStatus {
  MAIL_STATUS_UNREAD = 0;   // 未读
  MAIL_STATUS_READ = 1;     // 已读
  MAIL_STATUS_CLAIMED = 2;  // 已领取
  MAIL_STATUS_DELETED = 3;  // 已删除
}

// 邮件附件类型枚举
enum MailAttachmentType {
  MAIL_ATTACHMENT_TYPE_START = 0; //  邮件类型开始
  MAIL_ATTACHMENT_TYPE_ITEM = 1;     // 道具
  MAIL_ATTACHMENT_TYPE_CURRENCY = 2;  // 货币
  MAIL_ATTACHMENT_TYPE_EXP = 3;       // 经验
}

// 邮件操作结果枚举
enum MailResult {
  MAIL_RESULT_SUCCESS = 0;                    // 成功
  MAIL_RESULT_MAIL_NOT_FOUND = 1;             // 邮件不存在
  MAIL_RESULT_MAIL_EXPIRED = 2;               // 邮件已过期
  MAIL_RESULT_ATTACHMENT_ALREADY_CLAIMED = 3; // 附件已领取
  MAIL_RESULT_INVENTORY_FULL = 4;             // 背包已满
  MAIL_RESULT_INVALID_PARAM = 5;              // 参数错误
  MAIL_RESULT_MAIL_LIMIT_EXCEEDED = 6;        // 邮件数量超限
  MAIL_RESULT_NO_ATTACHMENT = 7;              // 没有附件
  MAIL_RESULT_CLAIM_FAILED = 8;               // 领取失败
  MAIL_RESULT_PARTIAL_CLAIM_SUCCESS = 9;      // 部分附件领取成功
}

// 附件道具条目（一个附件里可以有多个条目）
message MailAttachmentItem {
  int32 type = 1;
  int32 id = 2;   // 条目ID：道具ID/货币ID/资源ID
  int32 num = 3;  // 数量
}

// 邮件附件信息（一个邮件只有一个附件，但附件内可包含多个条目）
message MailAttachmentInfo {
  repeated MailAttachmentItem items = 1; // 附件条目列表
}

// 邮件信息
message MailInfo {
  int64 mail_id = 1;                       // 邮件ID
  MailType mail_type = 2;                  // 邮件类型
  string title = 3;                        // 邮件标题
  string content = 4;                      // 邮件内容
  int64 sender_id = 5;                     // 发送者ID（0表示系统）
  string sender_name = 6;                  // 发送者名称
  MailStatus status = 7;                   // 状态
  bool has_attachment = 8;                 // 是否有附件
  int32 attachment_count = 9;              // 附件数量
  MailAttachmentInfo attachment = 10;      // 附件（业务约定：只有一个）
  int64 expire_time = 11;                  // 过期时间戳（0表示永不过期）
  int64 send_time = 12;                    // 发送时间戳
  int64 read_time = 13;                    // 阅读时间戳
  int64 claim_time = 14;                   // 领取时间戳
  bool is_convenient = 15;                 // 是否可一键领取（true=可一键领取；false=只能单独领取）
  string sender_avatar = 16;               // 发送者头像（当非玩家邮件时使用；可存URL/资源名）
  int32 template_id = 17;                  // 邮件模板ID（0表示未使用模板）
  repeated string title_params = 18;       // 邮件标题参数
  repeated string content_params = 19;     // 邮件内容参数
}

// ====== 获取邮件列表 ======
message MailListReq {
  MailType mail_type = 1;  // 邮件类型（0表示全部）
  MailStatus status = 2;   // 状态筛选（0表示全部）
  int32 page = 3;          // 页码（从1开始）
  int32 page_size = 4;     // 每页数量
}

message MailListResp {
  MailResult result = 1;
  repeated MailInfo mails = 2;  // 邮件列表
  int32 total = 3;              // 总数
  int32 unread_count = 4;        // 未读数量
  int32 unClaimed_count = 5;        // 未领取
}

// ====== 获取邮件详情 ======
message MailDetailReq {
  int64 mail_id = 1;  // 邮件ID
}

message MailDetailResp {
  MailResult result = 1;
  MailInfo mail = 2;  // 邮件详情（包含所有附件信息）
}

// ====== 阅读邮件 ======
message MailReadReq {
  int64 mail_id = 1;  // 邮件ID
}

message MailReadResp {
  MailResult result = 1;
}

// ====== 领取附件 ======
message MailClaimReq {
  int64 mail_id = 1;  // 邮件ID
}

message MailClaimResp {
  MailResult result = 1;
  MailAttachmentInfo claimed_attachment = 2;  // 成功领取的附件（业务约定：只有一个）
  MailAttachmentInfo failed_attachment = 3;   // 失败的附件（可选，当前实现通常为空）
  int32 total_count = 4;                                 // 附件总数
  int32 claimed_count = 5;                               // 成功领取数量
  int32 failed_count = 6;                                 // 失败数量
}

// ====== 一键领取所有附件 ======
message MailClaimAllReq {
}

message MailClaimAllResp {
  MailResult result = 1;
  int32 claimed_count = 2;  // 成功领取数量
  int32 failed_count = 3;    // 失败数量
}

// ====== 删除邮件 ======
message MailDeleteReq {
  int64 mail_id = 1;  // 邮件ID
}

message MailDeleteResp {
  MailResult result = 1;
}

// ====== 一键删除已领取邮件 ======
message MailDeleteClaimedReq {
}

message MailDeleteClaimedResp {
  MailResult result = 1;
  int32 deleted_count = 2;  // 删除数量
}

// ====== 推送新邮件通知 ======
message PushMailNew {
  int32 unread_count = 1;  // 未读邮件数量
}

// ====== RPC接口消息（供运营后台调用） ======

// 发送个人邮件请求
message SendPlayerMailRequest {
  int64 user_id = 1;                    // 玩家ID
  MailType mail_type = 2;               // 邮件类型
  string title = 3;                     // 邮件标题
  string content = 4;                   // 邮件内容
  MailAttachmentInfo attachment = 5;          // 附件（业务约定：只有一个）
  int32 expire_days = 6;                // 过期天数
  bool is_convenient = 7;               // 是否可一键领取（true=可一键领取；false=只能单独领取）
}

// 发送个人邮件响应
message SendPlayerMailResponse {
  MailResult result = 1;
  int64 mail_id = 2;                    // 邮件ID
  string message = 3;                    // 消息
}

// 发送全服邮件请求
message SendServerMailRequest {
  MailType mail_type = 1;               // 邮件类型
  string title = 2;                     // 邮件标题
  string content = 3;                   // 邮件内容
  int32 template_id = 4;                // 模板ID
  int32 server_id = 5;                  // 服务器ID（0表示全服）
  repeated int32 unlock_list = 6;       // 解锁条件列表（unlockID数组，全部满足才可接收）
  MailAttachmentInfo attachment = 7;          // 附件（业务约定：只有一个）
  int32 expire_days = 8;               // 过期天数
  string created_by = 9;               // 创建者（GM账号）
  bool is_convenient = 10;              // 是否可一键领取（true=可一键领取；false=只能单独领取）
}

// 发送全服邮件响应
message SendServerMailResponse {
  MailResult result = 1;
  int64 server_mail_id = 2;             // 全服邮件ID
  string message = 3;                   // 消息
}

