syntax = "proto3";
package pb;
option go_package = "../logic/pb;pb";

import "commonMessage.proto";

// ====== 获取宠物详情 ======
message PetDetailReq {
  int64 petOwnId = 1;
}

message PetDetailResp {
  PetDetailInfo pet = 1;
}

// ====== 装配 / 卸下 ======
// 约束：每英雄最多1只宠物；穿戴会自动卸下旧宠物

message PetEquipReq {
  int64 petOwnId = 1;
  int64 heroOwnId = 2;    // 目标英雄；卸下时可传0
  int32 operationType = 3; // 0=穿戴；1=卸下
}

message PetEquipResp {
  PetDetailInfo pet = 1;
}

// ====== 升级 ======

message PetLevelUpReq {
  int64 petOwnId = 1;
  // 1=+1级 2=+5级 3=+10级
  int32 levelUpType = 2;
}

message PetLevelUpResp {
  PetDetailInfo pet = 1;
}

// ====== 升星 ======

message PetStarUpReq {
  int64 petOwnId = 1;
  repeated int64 petOwnIds = 2; // 材料宠物ID列表
}

message PetStarUpResp {
  PetDetailInfo pet = 1;
}

// ====== 重生 ======

message PetRebirthReq {
  int64 petOwnId = 1;
}

message PetRebirthResp {
  PetDetailInfo pet = 1;
}

// ====== 分解 ======

message PetDecomposeReq {
  repeated int64 petOwnIds = 1;
}

message PetDecomposeResp {
  bool isSuccess = 1;  // 1=成功 0=失败
}

// ====== 宠物满级满星详情 ======

message PetMaxLevelMaxStarDetailReq {
  int32 petId = 1;
}

message PetMaxLevelMaxStarDetailResp {
  PetDetailInfo petInfo = 1;
}

// ====== 缘分 ======

message PetAffinityInfo {
    int32 affinityId = 1;                   // PetAffinityCfg.Id
    int32 level = 2;                        // 0=未激活；>=1 表示已激活档位
    map<int32, int64> Attributes = 3;       // 宠物缘分属性
}

message PetStarBookEntry { 
  int32 petId = 1; 
  int32 maxStar = 2; 
}

message PushPetStarBookChange {
  repeated PetStarBookEntry changed = 1;
}

message PetAffinityLevelUpReq {
    int32 affinityId = 1;
}

message PetAffinityLevelUpResp {
    PetAffinityInfo info = 1;
}

message PetAffinityListReq {
}

message PetAffinityListResp {
  repeated PetAffinityInfo info = 1;
}

message PushPetDetail {
  repeated PetDetailInfo addPetList = 1;
  repeated PetDetailInfo removePetList = 2;
}

// ====== 宠物招募 ======

message PetRecruitSlot {
  int32 index = 1;          // 1~3
  int32 petId = 3;         // 宠物配置ID
  int32 state = 4;          // 0=可招募, 1=已招募
}

message PetRecruitInfo {
  repeated PetRecruitSlot slots = 1; // 固定3个
  int32 autoRefreshUsed = 2;       // 今日系统刷新已用次数
  int64 nextRefreshTime = 3;       // 下一次“系统刷新触发时间”(ms) 
  int32 manualRefreshFree = 4;     // 手动刷新是否免费,1为免费
  int32 diamondRecruitUsed = 5;    // 今日已使用钻石招募次数（用于折扣）
  int32 recruitCost = 6;    // 招募价格
  int32 tripleRecruit = 7; // 1=三倍招募 0=普通招募
  int32 recruitType = 8;   // 1=招募券 2=钻石
  int32 refreshGuaranteeCount = 9;  // 当前保底刷新计数
}

message PetRecruitReq {
  int32 recruitType = 1;   // 1=招募券 2=钻石
  int32 tripleRecruit = 2; // 1=三倍招募 0=普通招募
}

message PetRecruitResp {
  PetRecruitInfo basicInfo = 1;    // 返回最新面板（可能触动了自动刷新）
  int32 gainedPetId = 2;          // 实际获得petId
}

message PetRecruitDetailReq {  // 获取宠物招募详情
}

message PetRecruitDetailResp {
  PetRecruitInfo basicInfo = 1;
}

message PetRecruitRefreshReq { // 手动刷新招募信息
}

message PetRecruitRefreshResp { // 手动刷新招募信息
  PetRecruitInfo basicInfo = 1;
}

message PushPetRecruitChange { // 用于系统自动刷新以及跨天重置
  PetRecruitInfo basicInfo = 1;
}